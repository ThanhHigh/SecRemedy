server {
    # Comply 1: Listen only on authorized ports
    listen 80;
    server_name emarket.me www.emarket.me;

    # Violate 10: No HTTPS redirect

    root /var/www/emarket/spa/dist;
    index index.html;

    # Comply 4: Custom error pages
    error_page 404 /custom_404.html;
    location = /custom_404.html {
        root /var/www/error_pages;
    }

    # Comply 5: Hidden file serving disabled
    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # Violate 9: No proxy source IP passing
        proxy_pass http://127.0.0.1:8000;
    }
}
