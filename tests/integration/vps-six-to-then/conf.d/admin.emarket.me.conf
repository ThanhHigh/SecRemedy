server {
    # Comply 1: Listen only on authorized ports
    listen 80;
    server_name admin.emarket.me;

    # Violate 10: No HTTPS redirect, serving content on HTTP directly

    root /var/www/emarket/admin/public;
    index index.php index.html index.htm;

    # Comply 4: Custom error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Comply 5: Hidden file serving disabled
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        # Violate 9: Proxies do not pass source IP information
        proxy_pass http://127.0.0.1:8000;
    }
}
