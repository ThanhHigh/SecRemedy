user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # CIS 2.5.1 COMPLIANCE: server_tokens off globally
    server_tokens off;

    # Define log format "main"
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # CIS 3.2 COMPLIANCE: access_log enabled globally
    access_log /var/log/nginx/access.log main;

    # CIS 2.5.4 COMPLIANCE: hide backend headers
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # CIS 5.3.1 COMPLIANCE: nosniff header
    add_header X-Content-Type-Options "nosniff" always;

    # CIS 5.3.2 COMPLIANCE: CSP header
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'self'; form-action 'self';" always;

    include /etc/nginx/conf.d/*.conf;

    # CIS 2.4.2 COMPLIANCE: Catch-all server blocking unknown hosts
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }
}
