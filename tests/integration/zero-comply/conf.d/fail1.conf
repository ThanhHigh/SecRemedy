server {
    # CIS 2.4.1 VIOLATION: Listening on unauthorized port
    listen 8000;
    
    # CIS 2.4.2 VIOLATION: Catch-all server block returning 200 instead of rejecting
    listen 81 default_server;
    server_name _;
    return 200 "OK";

    # CIS 2.5.1 VIOLATION: server_tokens explicitly turned on
    server_tokens on;
    
    location / {
        root /usr/share/nginx/html;
    }
}
