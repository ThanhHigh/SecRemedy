server {
    listen 443 ssl;
    ssl_certificate /etc/ssl/mock_certs/nginx.crt;
    ssl_certificate_key /etc/ssl/mock_certs/nginx.key;
    server_name fail2.example.com;
    
    # CIS 2.5.2 VIOLATION: Missing custom error_page definitions, exposing default NGINX pages
    # (No error_page directives here)

    # CIS 2.5.3 VIOLATION: Explicitly allowing access to hidden files
    location ~ /\. {
        allow all;
    }

    location /proxy {
        # CIS 2.5.4 VIOLATION: Passing sensitive backend headers (overriding global proxy_hide_header)
        proxy_pass_header X-Powered-By;
        proxy_pass_header Server;
        proxy_pass http://127.0.0.1:8080;
    }
}
