server {
    # CIS 4.1.1 VIOLATION: Serving HTTP traffic without redirecting to HTTPS
    listen 80;
    server_name fail3.example.com;

    # CIS 3.2 VIOLATION: Explicitly disabling access log
    access_log off;

    location /api {
        # CIS 3.4 VIOLATION: proxy_pass without proxy_set_header X-Real-IP and X-Forwarded-For
        proxy_pass http://127.0.0.1:8081;
    }
}
