server {
    listen 443 ssl;
    ssl_certificate /etc/ssl/mock_certs/nginx.crt;
    ssl_certificate_key /etc/ssl/mock_certs/nginx.key;
    server_name fail4.example.com;

    location /admin {
        # CIS 5.1.1 VIOLATION: Explicit allow all without limit to specific IPs and deny all
        allow all;
    }

    # CIS 5.3.1 VIOLATION: Overriding global X-Content-Type-Options to empty string
    add_header X-Content-Type-Options "";

    # CIS 5.3.2 VIOLATION: Overriding global Content-Security-Policy to empty string
    add_header Content-Security-Policy "";
}
