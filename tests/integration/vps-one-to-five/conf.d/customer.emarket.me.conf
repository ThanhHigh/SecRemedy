server {
    listen 80;
    server_name customer.emarket.me;
    # Comply 10: Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name customer.emarket.me;

    ssl_certificate /etc/ssl/mock_certs/nginx.crt;
    ssl_certificate_key /etc/ssl/mock_certs/nginx.key;

    # Violate 4: No custom error pages
    # Violate 5: No hidden file protection

    location / {
        # Comply 9: Proxies pass source IP
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
