server {
    listen 80;
    server_name admin.emarket.me;
    # Comply 10: Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    # Violate 1: Listening on unauthorized port (8443)
    listen 443 ssl http2;
    listen 8443 ssl http2;
    server_name admin.emarket.me;

    ssl_certificate /etc/ssl/mock_certs/admin.crt;
    ssl_certificate_key /etc/ssl/mock_certs/admin.key;

    root /var/www/emarket/admin/public;
    index index.php index.html index.htm;

    # Violate 4: No custom error pages (default used)
    # Violate 5: No hidden file protection (can access .env, .git)

    # Duplicate directive to test robust parsing
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Comply 9: proxies pass source IP information (FastCGI but similar principles, using proxy_pass for Laravel Octane)
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
