server {
    listen 443 ssl;
    server_name ~^(?<vendor>.+)\.emarket\.me$;

    ssl_certificate /etc/nginx/ssl/wildcard.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard.key;

    # --- VIOLATIONS ---
    client_max_body_size 5M; # Still > 2M compliance threshold
    ssl_protocols TLSv1.2;

    # Rule 2 Compliance
    location ~ /\. { deny all; return 404; }

    location / {
        proxy_pass http://laravel_api_upstream;
        proxy_set_header Host $host;
    }
}
