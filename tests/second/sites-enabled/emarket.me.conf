server {
    listen 443 ssl;
    server_name emarket.me www.emarket.me;

    ssl_certificate /etc/nginx/ssl/spa.crt;
    ssl_certificate_key /etc/nginx/ssl/spa.key;

    # --- VIOLATIONS (RULES 6, 7) ---
    client_max_body_size 25M;
    ssl_protocols TLSv1.2; # Only 1.2 is also weak per modern CIS (needs 1.3)

    # --- MISSING HEADERS ---

    # Rule 2 Compliance
    location ~ /\. { deny all; return 404; }

    location / {
        proxy_pass http://vue_spa_upstream;
        proxy_set_header Host $host;
    }
}
