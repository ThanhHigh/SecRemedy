server {
    listen 443 ssl;
    server_name api.emarket.me;

    ssl_certificate /etc/nginx/ssl/api.crt;
    ssl_certificate_key /etc/nginx/ssl/api.key;

    # --- VIOLATIONS (RULES 6, 7) ---
    client_max_body_size 100M;           # Rule 6 Violation
    ssl_protocols TLSv1.0 TLSv1.1;       # Rule 7 Violation

    # --- MISSING HEADERS (RULES 8, 9, 10 VIOLATIONS) ---

    # Rule 2 Compliance
    location ~ /\. { deny all; return 404; }

    location / {
        proxy_pass http://laravel_api_upstream;
        proxy_set_header Host $host;
    }
}
