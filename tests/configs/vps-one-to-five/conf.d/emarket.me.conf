server {
    listen 80;
    server_name emarket.me www.emarket.me;
    # Comply 10: Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name emarket.me www.emarket.me;

    ssl_certificate /etc/ssl/mock_certs/nginx.crt;
    ssl_certificate_key /etc/ssl/mock_certs/nginx.key;

    root /var/www/emarket/spa/dist;
    index index.html;

    # Violate 4: No custom error pages
    # Violate 5: No hidden file protection

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Intentional duplicate location to test robustness
    location /assets {
        alias /var/www/emarket/spa/dist/assets;
    }
}
