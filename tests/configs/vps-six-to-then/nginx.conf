user www-data;
worker_processes auto;

# Violate 8: error logging set to error level (default, but explicitly set here)
error_log /var/log/nginx/error.log error;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Comply 3: server_tokens off
    server_tokens off;

    # Violate 6: No detailed logging format defined (using default combined)
    # Violate 7: Access logging disabled globally
    access_log off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Comply 2: Reject unknown host names (Catch-all block)
    server {
        listen 80 default_server;
        # Comply 1: Only listen on authorized ports
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate /etc/ssl/mock_certs/nginx.crt;
        ssl_certificate_key /etc/ssl/mock_certs/nginx.key;
        ssl_reject_handshake on;
        
        # Comply 4: Custom error pages (to not reference nginx)
        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Comply 5: Disable hidden file serving
        location ~ /\. {
            deny all;
        }

        return 444;
    }

    include /etc/nginx/conf.d/*.conf;
}
