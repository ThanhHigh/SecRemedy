server {
    # Comply 1: Listen only on authorized ports
    listen 80;
    server_name vendor.emarket.me;

    # Violate 10: No HTTPS redirect

    # Comply 4: Custom error pages
    error_page 403 /403.html;
    location = /403.html {
        root /var/www/error_pages;
    }

    # Comply 5: Hidden file serving disabled
    location ~ /\. {
        deny all;
    }

    location / {
        # Violate 9: Proxies do not pass source IP information
        proxy_pass http://127.0.0.1:8001;
    }
}
