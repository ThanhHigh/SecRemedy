server {
    listen 443 ssl;
    server_name emarket.me www.emarket.me;

    ssl_certificate /etc/nginx/ssl/spa.crt;
    ssl_certificate_key /etc/nginx/ssl/spa.key;

    # --- OVERRIDING WITH VIOLATIONS (RULES 1, 3, 4, 5) ---
    server_tokens on; 
    keepalive_timeout 120; # Even worse violation
    send_timeout 120;

    # Rule 8 Compliance
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Rule 2 Violation: Missing the 'location ~ /\.' block.

    location / {
        proxy_pass http://vue_spa_upstream;
        proxy_set_header Host $host;
    }
}
