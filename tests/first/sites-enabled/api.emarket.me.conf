server {
    listen 80;
    server_name api.emarket.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.emarket.me;

    ssl_certificate /etc/nginx/ssl/api.crt;
    ssl_certificate_key /etc/nginx/ssl/api.key;

    # --- OVERRIDING WITH VIOLATIONS (RULES 1, 3, 4, 5) ---
    server_tokens on;      # Rule 1 Violation
    keepalive_timeout 65;  # Rule 3 Violation
    send_timeout 60;       # Rule 4 Violation
    client_header_timeout 60s; # Rule 5 Violation
    client_body_timeout 60s;   # Rule 5 Violation

    # Rule 8 Compliance (HSTS)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Rule 2 Violation: Missing the 'location ~ /\.' block here.

    access_log /var/log/nginx/api_access.log;

    location / {
        proxy_pass http://laravel_api_upstream;
        proxy_set_header Host $host;
    }
}
