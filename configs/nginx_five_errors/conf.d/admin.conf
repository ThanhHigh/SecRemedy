server {
    listen 8443 ssl;
    server_name admin.local;
    
    ssl_certificate      /etc/ssl/mock_certs/admin.crt;
    ssl_certificate_key  /etc/ssl/mock_certs/admin.key;
    
    # Intentional mistake: Using very old SSL protocol
    ssl_protocols SSLv3 TLSv1;
    
    location / {
        root /var/www/admin;
    }
}
