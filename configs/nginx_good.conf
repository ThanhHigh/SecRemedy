user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # LUẬT 1: Đã tắt Server Tokens
    server_tokens off;

    # LUẬT 3: Chống Clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # LUẬT 4: Chống MIME Sniffing
    add_header X-Content-Type-Options "nosniff" always;

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }

    server {
        listen       443 ssl;
        server_name  localhost;

        ssl_certificate      /etc/ssl/mock_certs/nginx.crt;
        ssl_certificate_key  /etc/ssl/mock_certs/nginx.key;

        # LUẬT 5: Chỉ sử dụng TLS hiện đại
        ssl_protocols TLSv1.2 TLSv1.3;

        # LUẬT 2: Đã bật HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
}