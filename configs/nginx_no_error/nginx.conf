user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    include       /etc/nginx/conf.d/*.conf;
    default_type  application/octet-stream;

    # Đã sửa lỗi 1: Tắt server_tokens
    server_tokens off; 

    # Đã sửa lỗi 3 & 4: Thêm các Security Headers (X-Frame-Options, X-Content-Type-Options)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }

    server {
        listen       443 ssl;
        server_name  localhost;

        ssl_certificate      /etc/ssl/mock_certs/nginx.crt;
        ssl_certificate_key  /etc/ssl/mock_certs/nginx.key;

        # Đã sửa lỗi 5: Sử dụng các giao thức TLS an toàn
        ssl_protocols TLSv1.2 TLSv1.3;

        # Đã sửa lỗi 2: Thêm header Strict-Transport-Security (HSTS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
}