server {
    listen 8443 ssl;
    server_name admin.local;
    
    ssl_certificate      /etc/ssl/mock_certs/admin.crt;
    ssl_certificate_key  /etc/ssl/mock_certs/admin.key;
    
    # Fixed: Only modern SSL protocols are used
    ssl_protocols TLSv1.2 TLSv1.3;
    
    location / {
        root /var/www/admin;
    }
}
